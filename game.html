<!doctype html>
<html lang="fr">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
	<meta name="theme-color" content="#000000">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="StoryBook">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>StoryBook</title>
	<link rel="manifest" href="manifest.webmanifest">
	<link rel="icon" href="icons/icon-192.png" type="image/png">
	<link rel="apple-touch-icon" href="icons/icon-192.png">
	<link rel="stylesheet" href="game.css">
</head>
<body class="game-page">
	<main class="game-shell">
		<div class="game-frame" id="gameFrame">
			<canvas id="unityCanvas" tabindex="-1"></canvas>
			<div class="loading-panel" id="loadingPanel">
				<img class="loading-cover" src="assets/images/loading-cover.png" alt="La Maison des Contes">
				<div class="loading-content">
					<p id="statusText">Préparation du jeu…</p>
					<div class="progress-track" aria-hidden="true">
						<div class="progress-fill" id="progressFill"></div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="app.js" defer></script>
</body>
</html>
